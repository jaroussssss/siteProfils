name: Deploy → main

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_PAT
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            APP_DIR="$HOME/SiteProfils"
            if [ ! -d "$APP_DIR" ]; then
              git clone https://$GH_PAT@github.com/jaroussssss/siteProfils.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull https://$GH_PAT@github.com/jaroussssss/siteProfils.git main
            npm ci --omit=dev --silent 2>/dev/null || true
            mkdir -p tmp && touch tmp/restart.txt
            echo "SiteProfils deploye $(date)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}