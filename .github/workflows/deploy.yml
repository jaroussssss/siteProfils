name: Deploy → main

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_PAT
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            REPO_URL="https://$GH_PAT@github.com/jaroussssss/siteProfils.git"
            if [ ! -d ~/SiteProfils ]; then
              git clone "$REPO_URL" ~/SiteProfils
            fi
            rm -f ~/SiteProfils/.git/index.lock ~/SiteProfils/.git/FETCH_HEAD.lock 2>/dev/null || true
            cd ~/SiteProfils
            git fetch "$REPO_URL" main
            git reset --hard FETCH_HEAD
            npm ci --omit=dev --silent 2>/dev/null || true
            mkdir -p tmp && touch tmp/restart.txt
            mkdir -p ~/ClaudeBoost/public/downloads
            cp ~/SiteProfils/public/claudeboost/*.html ~/ClaudeBoost/public/ 2>/dev/null || true
            cp ~/SiteProfils/public/claudeboost/downloads/* ~/ClaudeBoost/public/downloads/ 2>/dev/null || true
            touch ~/ClaudeBoost/tmp/restart.txt
            echo "Deploy OK $(date)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}