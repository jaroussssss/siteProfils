name: Deploy → main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_PAT
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            echo "=== PM2 STATUS ==="
            pm2 list 2>&1 || echo "PM2 absent"
            echo "=== PM2 LOGS (10 dernières lignes) ==="
            pm2 logs siteprofils --nostream --lines 10 2>&1 || echo "Pas de logs"
            echo "=== FILES ==="
            ls ~/siteprofils/public/claudeboost/ 2>&1 || echo "Dossier absent"
            echo "=== ROUTE CHECK ==="
            grep -n "claudeboost\|/:link" ~/siteprofils/server.js 2>&1 | head -5 || echo "Fichier absent"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}