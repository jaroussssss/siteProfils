name: Deploy → main

on:
  push:
    branches: [main]
  # Cron : pull claude-hub toutes les 5 min (auto-deploy passif quand claude-hub
  # est push sans toucher siteProfils). Contourne les blocages LiteSpeed sur les
  # webhooks N0C en passant par GitHub Actions runners.
  schedule:
    - cron: '*/5 * * * *'
  # Trigger manuel disponible dans l'UI GitHub Actions
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_PAT,WEBHOOK_SECRET
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # ============================================================
            # 1. SiteProfils — main Passenger app
            # ============================================================
            REPO_URL="https://$GH_PAT@github.com/jaroussssss/siteProfils.git"
            if [ ! -d ~/SiteProfils ]; then
              git clone "$REPO_URL" ~/SiteProfils
            fi
            rm -f ~/SiteProfils/.git/index.lock ~/SiteProfils/.git/FETCH_HEAD.lock 2>/dev/null || true
            cd ~/SiteProfils
            git fetch "$REPO_URL" main
            git reset --hard FETCH_HEAD
            npm ci --omit=dev --silent 2>/dev/null || true

            # ============================================================
            # 2. claude-hub — sibling repo (source claudeboost + skills + hub)
            # ============================================================
            HUB_URL="https://$GH_PAT@github.com/jaroussssss/claude-hub.git"
            if [ ! -d ~/claude-hub ]; then
              git clone "$HUB_URL" ~/claude-hub
            else
              cd ~/claude-hub
              rm -f .git/index.lock .git/FETCH_HEAD.lock 2>/dev/null || true
              git fetch "$HUB_URL" main
              git reset --hard FETCH_HEAD
            fi

            # ============================================================
            # 3. SiteProfils .env — WEBHOOK_SECRET pour le webhook claude-hub
            # ============================================================
            cd ~/SiteProfils
            if [ -n "$WEBHOOK_SECRET" ]; then
              if grep -q '^WEBHOOK_SECRET=' .env 2>/dev/null; then
                sed -i "s|^WEBHOOK_SECRET=.*|WEBHOOK_SECRET=$WEBHOOK_SECRET|" .env
              else
                echo "WEBHOOK_SECRET=$WEBHOOK_SECRET" >> .env
              fi
            fi

            # ============================================================
            # 4. claude-hub claudeboost app — npm install + restart
            # ============================================================
            cd ~/claude-hub/site/claudeboost
            if [ -f package.json ]; then
              npm install --omit=dev --silent 2>/dev/null || true
            fi
            # Set WEBHOOK_SECRET dans .env de l'app claudeboost (idempotent)
            if [ -n "$WEBHOOK_SECRET" ]; then
              if grep -q '^WEBHOOK_SECRET=' .env 2>/dev/null; then
                sed -i "s|^WEBHOOK_SECRET=.*|WEBHOOK_SECRET=$WEBHOOK_SECRET|" .env
              else
                echo "WEBHOOK_SECRET=$WEBHOOK_SECRET" >> .env
              fi
            fi
            mkdir -p tmp && touch tmp/restart.txt

            # ============================================================
            # 4b. Mirror vers le path statique servi par LiteSpeed
            # ============================================================
            # LiteSpeed/cPanel sert /claudeboost/ depuis un dossier static (pas
            # via Express). On detecte le bon path et on y miroitt le contenu.
            # Candidats classiques cPanel/N0C :
            HUB_SRC=~/claude-hub/site/claudeboost
            CANDIDATES=(
              ~/public_html/claudeboost
              ~/public_html/tempcestlouisquirac.fr/claudeboost
              ~/tempcestlouisquirac.fr/claudeboost
              ~/www/claudeboost
              ~/public/claudeboost
              ~/ClaudeBoost/public
            )
            for DEST in "${CANDIDATES[@]}"; do
              PARENT=$(dirname "$DEST")
              # On copie uniquement si le PARENT existe deja (= path reel cPanel)
              if [ -d "$PARENT" ]; then
                mkdir -p "$DEST/assets"
                cp -f "$HUB_SRC"/*.html "$DEST/" 2>/dev/null || true
                cp -rf "$HUB_SRC"/assets/* "$DEST/assets/" 2>/dev/null || true
                cp -f "$HUB_SRC"/README.md "$DEST/" 2>/dev/null || true
                echo "Mirror -> $DEST OK ($(ls "$DEST" | wc -l) entries)"
              fi
            done

            # ============================================================
            # 5. Restart Passenger SiteProfils
            # ============================================================
            cd ~/SiteProfils
            mkdir -p tmp && touch tmp/restart.txt
            echo "Deploy OK $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
