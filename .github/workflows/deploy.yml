name: Deploy → main

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: GH_PAT,WEBHOOK_SECRET
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # ============================================================
            # 1. SiteProfils — main Passenger app
            # ============================================================
            REPO_URL="https://$GH_PAT@github.com/jaroussssss/siteProfils.git"
            if [ ! -d ~/SiteProfils ]; then
              git clone "$REPO_URL" ~/SiteProfils
            fi
            rm -f ~/SiteProfils/.git/index.lock ~/SiteProfils/.git/FETCH_HEAD.lock 2>/dev/null || true
            cd ~/SiteProfils
            git fetch "$REPO_URL" main
            git reset --hard FETCH_HEAD
            npm ci --omit=dev --silent 2>/dev/null || true

            # ============================================================
            # 2. claude-hub — sibling repo (source claudeboost + skills + hub)
            # ============================================================
            HUB_URL="https://$GH_PAT@github.com/jaroussssss/claude-hub.git"
            if [ ! -d ~/claude-hub ]; then
              git clone "$HUB_URL" ~/claude-hub
            else
              cd ~/claude-hub
              rm -f .git/index.lock .git/FETCH_HEAD.lock 2>/dev/null || true
              git fetch "$HUB_URL" main
              git reset --hard FETCH_HEAD
            fi

            # ============================================================
            # 3. SiteProfils .env — WEBHOOK_SECRET pour le webhook claude-hub
            # ============================================================
            cd ~/SiteProfils
            if [ -n "$WEBHOOK_SECRET" ]; then
              if grep -q '^WEBHOOK_SECRET=' .env 2>/dev/null; then
                sed -i "s|^WEBHOOK_SECRET=.*|WEBHOOK_SECRET=$WEBHOOK_SECRET|" .env
              else
                echo "WEBHOOK_SECRET=$WEBHOOK_SECRET" >> .env
              fi
            fi

            # ============================================================
            # 4. claude-hub claudeboost app — npm install + restart
            # ============================================================
            cd ~/claude-hub/site/claudeboost
            if [ -f package.json ]; then
              npm install --omit=dev --silent 2>/dev/null || true
            fi
            # Set WEBHOOK_SECRET dans .env de l'app claudeboost (idempotent)
            if [ -n "$WEBHOOK_SECRET" ]; then
              if grep -q '^WEBHOOK_SECRET=' .env 2>/dev/null; then
                sed -i "s|^WEBHOOK_SECRET=.*|WEBHOOK_SECRET=$WEBHOOK_SECRET|" .env
              else
                echo "WEBHOOK_SECRET=$WEBHOOK_SECRET" >> .env
              fi
            fi
            mkdir -p tmp && touch tmp/restart.txt

            # Pas de miroir vers l'app legacy ~/ClaudeBoost : la nouvelle app
            # claude-hub/site/claudeboost/ se suffit a elle-meme (server.js + static).

            # ============================================================
            # 5. Restart Passenger SiteProfils
            # ============================================================
            cd ~/SiteProfils
            mkdir -p tmp && touch tmp/restart.txt
            echo "Deploy OK $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
